name: Build OCR Runtime

# Manual trigger only. Run this whenever the OCR worker script or its
# Python dependencies change; download the resulting artifact and drop the
# executable into the main app's resources/ocr-runtime/win32-x64/.
on:
  workflow_dispatch:

jobs:
  build-windows-x64:
    name: Windows x64 SVTR runtime
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.10"
          architecture: x64
          cache: pip

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python -m pip install openmim pyinstaller pillow numpy opencv-python-headless
          python -m mim install "mmcv==2.0.1"
          python -m pip install "mmengine==0.10.7" "mmdet==3.1.0" "mmocr==1.0.1"

      - name: Download SVTR model
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/ocr-models | Out-Null
          Invoke-WebRequest `
            -Uri "https://download.openmmlab.com/mmocr/textrecog/svtr/svtr-small_20e_st_mj/svtr-small_20e_st_mj-35d800d6.pth" `
            -OutFile "resources/ocr-models/svtr-small_20e_st_mj-35d800d6.pth"

      - name: Build Windows runtime
        shell: pwsh
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          SVTR_MODEL: ${{ github.workspace }}\resources\ocr-models\svtr-small_20e_st_mj-35d800d6.pth
        run: node scripts/build-mmocr-runtime.mjs

      - name: Verify runtime output
        shell: pwsh
        run: |
          if (!(Test-Path "resources/ocr-runtime/win32-x64/mmocr-svtr-worker.exe")) {
            throw "Missing resources/ocr-runtime/win32-x64/mmocr-svtr-worker.exe"
          }
          Get-ChildItem -Recurse resources/ocr-runtime,resources/ocr-models

      - name: Smoke test Windows runtime
        shell: pwsh
        run: |
          $process = New-Object System.Diagnostics.Process
          $process.StartInfo.FileName = "$PWD\resources\ocr-runtime\win32-x64\mmocr-svtr-worker.exe"
          $process.StartInfo.RedirectStandardInput = $true
          $process.StartInfo.RedirectStandardOutput = $true
          $process.StartInfo.RedirectStandardError = $true
          $process.StartInfo.UseShellExecute = $false
          $process.StartInfo.EnvironmentVariables["NINES_SVTR_WEIGHTS"] = "$PWD\resources\ocr-models\svtr-small_20e_st_mj-35d800d6.pth"
          [void]$process.Start()
          $readyLine = $process.StandardOutput.ReadLineAsync()
          if (!$readyLine.Wait(120000)) {
            $process.Kill()
            throw "Runtime did not become ready within 120 seconds. stderr: $($process.StandardError.ReadToEnd())"
          }
          $line = $readyLine.Result
          if (!$process.HasExited) {
            $process.Kill()
          }
          if ($line -match '"type"\s*:\s*"ready"') {
            Write-Host "Runtime loaded successfully."
          } elseif ($process.HasExited -and $process.ExitCode -ne 0) {
            throw "Runtime exited early with code $($process.ExitCode). stdout: $($process.StandardOutput.ReadToEnd()) stderr: $($process.StandardError.ReadToEnd())"
          } else {
            throw "Runtime emitted unexpected stdout: $line stderr: $($process.StandardError.ReadToEnd())"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ocr-runtime-win32-x64
          path: |
            resources/ocr-runtime/win32-x64/mmocr-svtr-worker.exe
            resources/ocr-models/svtr-small_20e_st_mj-35d800d6.pth
          if-no-files-found: error
          retention-days: 14
